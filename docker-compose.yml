services:
  backend:
    build: ./backend
    container_name: atenna-backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data

  nginx:
    image: nginx:alpine
    container_name: atenna-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
