<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <title>Atenna E2E Fixture — Perplexity-like</title>
  <style>
    body { margin: 0; background: #1c1c1e; color: #e5e5e5; font-family: sans-serif; }
    .main { display: flex; flex-direction: column; align-items: center; padding-top: 40vh; }
    #perplexity-input {
      width: 600px; height: 52px; padding: 12px 16px;
      background: #2a2a2c; border: 1px solid #3a3a3c; border-radius: 12px;
      color: #e5e5e5; font-size: 16px; resize: none; outline: none;
    }
    .input-wrap { position: relative; width: 600px; }
    #value-display {
      margin-top: 12px; font-size: 12px; color: #888;
      font-family: monospace; max-width: 600px; word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="input-wrap">
      <!--
        Simulate Perplexity's React-controlled textarea:
        - React keeps an internal value in fiber state
        - Direct .value assignment without proper events gets overwritten on re-render
        - This fixture mimics that behaviour using a lightweight controlled-input loop
      -->
      <!--
        id="prompt-textarea" so detectPlatform (localhost) injects the badge.
        React reconcile simulation runs on this element.
      -->
      <textarea id="prompt-textarea" placeholder="Ask anything..."></textarea>
    </div>
    <div id="value-display">valor atual: (vazio)</div>
  </div>

  <script>
    // Simulate React's controlled input:
    // React attaches an onInput/onChange handler and syncs internal state.
    // If the DOM value changes without an InputEvent with inputType,
    // React will overwrite with its stale internal value on next render.
    const textarea = document.getElementById('prompt-textarea');
    let reactInternalValue = '';

    // Mimic React's synthetic event binding — React 17+ uses root delegation
    // We simulate by listening at document level, which is what React actually does
    document.addEventListener('input', (e) => {
      if (e.target !== textarea) return;
      // React reads nativeEvent.data and nativeEvent.inputType
      // Only update internal state if the event has a proper inputType
      const ie = e;
      if (ie.inputType || ie.data !== undefined) {
        reactInternalValue = textarea.value;
        document.getElementById('value-display').textContent =
          'valor atual: ' + reactInternalValue;
      }
    });

    // Simulate React's reconciliation flush: periodically checks if DOM value
    // matches internal state and RESETS it if it was changed without a proper event.
    // This is the core of the bug: extensions that do `textarea.value = x` without
    // a proper InputEvent will have their change reverted here.
    let reconcileEnabled = true;
    setInterval(() => {
      if (!reconcileEnabled) return;
      if (textarea.value !== reactInternalValue) {
        // React would re-render and reset — simulate that
        textarea.value = reactInternalValue;
        document.getElementById('value-display').textContent =
          'REVERTIDO para: ' + reactInternalValue + ' (react reset)';
      }
    }, 50);

    // Expose control to tests
    window.__atenna_test = {
      getReactValue: () => reactInternalValue,
      getDomValue: () => textarea.value,
      disableReconcile: () => { reconcileEnabled = false; },
      enableReconcile: () => { reconcileEnabled = true; },
    };
  </script>
</body>
</html>
