<!DOCTYPE html>
<html lang="pt-BR" style="width: 520px; height: auto; overflow: hidden; max-height: 100vh;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atenna</title>
  <link rel="stylesheet" href="modal.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      width: 520px;
      overflow: hidden;
      height: auto;
    }
    body {
      width: 520px;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
      overflow: hidden !important;
      height: auto;
      min-height: auto;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    #atenna-popup {
      width: 100%;
      height: auto;
      overflow: hidden !important;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
    }

    /* ── Popup enterprise UI ── */
    .ap-loading {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; min-height: 120px;
    }
    .ap-spinner {
      width: 28px; height: 28px;
      border: 3px solid #f0f0f0; border-top-color: #22c55e;
      border-radius: 50%; animation: ap-spin 0.8s linear infinite;
    }
    @keyframes ap-spin { to { transform: rotate(360deg); } }

    .ap-root {
      display: flex; flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff; border-radius: 12px; overflow: hidden;
    }

    /* Header */
    .ap-header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .ap-header__logo {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    }
    .ap-header__info { flex: 1; min-width: 0; }
    .ap-header__name { font-size: 13px; font-weight: 700; color: #111; }
    .ap-header__email { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ap-badge {
      font-size: 10px; font-weight: 700; border-radius: 20px;
      padding: 3px 10px; letter-spacing: 0.04em; flex-shrink: 0;
    }
    .ap-badge--pro { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .ap-badge--free { background: #f9f9f9; color: #888; border: 1px solid #e5e5e5; }

    /* Platform status */
    .ap-platform {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 18px; font-size: 12px;
    }
    .ap-platform--ok { background: #f0fdf4; color: #16a34a; }
    .ap-platform--warn { background: #fafafa; color: #888; }
    .ap-platform__dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .ap-platform__dot--green { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.15); }
    .ap-platform__dot--gray { background: #ccc; }

    /* Buttons */
    .ap-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      transition: all 140ms ease;
    }
    .ap-btn--primary {
      background: #22c55e; color: #fff;
      box-shadow: 0 2px 8px rgba(34,197,94,0.25);
    }
    .ap-btn--primary:hover { background: #16a34a; transform: translateY(-1px); }
    .ap-btn--primary:disabled {
      background: #e5e5e5; color: #aaa; box-shadow: none; cursor: not-allowed; transform: none;
    }
    .ap-btn--big { padding: 11px 20px; width: calc(100% - 36px); margin: 14px 18px 0; }

    /* Tips */
    .ap-tips {
      margin: 12px 18px 0;
      padding: 12px 14px;
      background: #f8faff;
      border: 1px solid #e0e7ff;
      border-radius: 8px;
    }
    .ap-tips__title { font-size: 11px; font-weight: 600; color: #4f46e5; margin-bottom: 6px; }
    .ap-tips__list { display: flex; gap: 8px; flex-wrap: wrap; }
    .ap-tips__list span {
      font-size: 11px; color: #555; background: #fff;
      border: 1px solid #e0e7ff; border-radius: 6px; padding: 3px 8px;
    }

    /* Features list */
    .ap-features { display: flex; flex-direction: column; gap: 0; margin: 10px 0 0; }
    .ap-feature {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 18px; font-size: 12px; color: #555;
      border-bottom: 1px solid #f5f5f5;
    }
    .ap-feature:last-child { border-bottom: none; }
    .ap-feature__icon {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 7px;
      background: #f0fdf4; color: #16a34a;
    }
    .ap-feature__icon svg { display: block; }
    .ap-platform__icon { display: flex; align-items: center; }

    /* Footer */
    .ap-footer {
      display: flex; gap: 0;
      border-top: 1px solid #f0f0f0;
      margin-top: 12px;
    }
    .ap-footer__btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: inherit; font-size: 12px; font-weight: 500; color: #555;
      background: none; border: none; cursor: pointer;
      padding: 12px 8px; transition: background 140ms ease;
      border-right: 1px solid #f0f0f0;
    }
    .ap-footer__btn:last-child { border-right: none; }
    .ap-footer__btn:hover { background: #f9f9f9; }
    .ap-footer__btn--danger { color: #dc2626; }
    .ap-footer__btn--danger:hover { background: #fff5f5; }

    /* Login screen */
    .ap-root--login {
      padding: 28px 24px 24px; align-items: center; gap: 14px;
    }
    .ap-login-logo { display: flex; justify-content: center; }
    .ap-login-title { font-size: 16px; font-weight: 700; color: #111; text-align: center; }
    .ap-login-form {
      width: 100%; display: flex; flex-direction: column; gap: 10px;
    }
    .ap-login-form input {
      width: 100%; padding: 10px 12px; border: 1.5px solid #e5e5e5;
      border-radius: 8px; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 150ms;
    }
    .ap-login-form input:focus { border-color: #22c55e; }
    .ap-login-form .ap-btn--primary { padding: 11px; width: 100%; margin: 0; font-size: 14px; }
    .ap-login-err {
      width: 100%; font-size: 12px; color: #dc2626; background: #fff5f5;
      border: 1px solid #fecaca; border-radius: 6px; padding: 8px 12px; text-align: center;
    }
    .ap-pass-wrap { position: relative; width: 100%; }
    .ap-pass-wrap input { width: 100%; padding-right: 38px; }
    .ap-eye-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #aaa; display: flex; align-items: center;
      padding: 0;
    }
    .ap-eye-btn:hover { color: #555; }
    .ap-login-links {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px;
    }
    .ap-link-btn {
      background: none; border: none; cursor: pointer;
      font-size: 12px; color: #22c55e; font-weight: 500; padding: 0;
    }
    .ap-link-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="atenna-popup"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
