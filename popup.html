<!DOCTYPE html>
<html lang="pt-BR" style="width: 520px; height: auto;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atenna</title>
  <link rel="stylesheet" href="modal.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 520px;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
      overflow: hidden;
    }
    body {
      padding: 0;
      margin: 0;
    }
    #atenna-popup {
      width: 100%;
      max-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-scrollbar-width: thin;
    }
    #atenna-popup::-webkit-scrollbar {
      width: 8px;
    }
    #atenna-popup::-webkit-scrollbar-track {
      background: transparent;
    }
    #atenna-popup::-webkit-scrollbar-thumb {
      background: #d0d0d0;
      border-radius: 4px;
    }
    #atenna-popup::-webkit-scrollbar-thumb:hover {
      background: #a0a0a0;
    }
  </style>
</head>
<body>
  <div id="atenna-popup"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
