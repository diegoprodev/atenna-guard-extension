<!DOCTYPE html>
<html lang="pt-BR" style="width: 520px; height: auto;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atenna</title>
  <link rel="stylesheet" href="modal.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 520px;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
      overflow: hidden;
      height: auto;
      min-height: auto;
    }
    body {
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    #atenna-popup {
      width: 100%;
      height: auto;
      overflow: visible;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="atenna-popup"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
