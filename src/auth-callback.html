<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmando acesso…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      color: #111;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f0f0f0;
      border-top: 3px solid #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .countdown {
      font-size: 12px;
      color: #999;
      margin-top: 16px;
    }
    .error {
      color: #ef4444;
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="spinner"></div>
      <h1>Confirmando seu acesso…</h1>
      <p>Você será redirecionado em alguns segundos.</p>
      <div class="countdown">Encerrando em <span id="countdown">3</span>s…</div>
    </div>
    <div id="success" style="display: none;">
      <div class="icon">✨</div>
      <h1>Acesso confirmado!</h1>
      <p>Você agora pode usar o Atenna. A aba será fechada em breve.</p>
      <div class="countdown">Encerrando em <span id="countdown-success">3</span>s…</div>
    </div>
    <div id="error" style="display: none;">
      <div class="icon">⚠️</div>
      <h1>Erro na confirmação</h1>
      <div class="error" id="error-msg"></div>
      <p>Feche esta aba e tente novamente na extensão.</p>
    </div>
  </div>

  <script>
    function getCallbackParams() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      return {
        access_token: params.get('access_token'),
        refresh_token: params.get('refresh_token'),
        expires_in: params.get('expires_in'),
        token_type: params.get('token_type'),
        type: new URLSearchParams(window.location.search).get('type'),
        error: params.get('error'),
        error_description: params.get('error_description'),
      };
    }

    function decodeJwtPayload(token) {
      try {
        const parts = token.split('.');
        if (parts.length !== 3) throw new Error('Invalid JWT');
        const decoded = atob(parts[1].replace(/-/g, '+').replace(/_/g, '/'));
        return JSON.parse(decoded);
      } catch {
        return null;
      }
    }

    async function handleCallback() {
      const params = getCallbackParams();

      if (params.error) {
        showError(`${params.error}: ${params.error_description || 'Unknown error'}`);
        return;
      }

      if (!params.access_token) {
        showError('Token não recebido. Tente novamente.');
        return;
      }

      try {
        const payload = decodeJwtPayload(params.access_token);
        if (!payload || !payload.email) {
          showError('Email não encontrado no token.');
          return;
        }

        const expiresAtSeconds = Math.floor(Date.now() / 1000) + parseInt(params.expires_in || '3600', 10);

        // Store in chrome storage
        const storage = {};
        storage['atenna_jwt'] = {
          access_token: params.access_token,
          refresh_token: params.refresh_token,
          email: payload.email,
          expires_at: expiresAtSeconds,
        };

        chrome.storage.local.set(storage, () => {
          showSuccess();
          setTimeout(() => window.close(), 3000);
        });
      } catch (e) {
        showError('Erro ao processar token: ' + String(e));
      }
    }

    function showSuccess() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'block';

      let countdown = 3;
      const countdownEl = document.getElementById('countdown-success');
      const interval = setInterval(() => {
        countdown--;
        countdownEl.textContent = String(Math.max(0, countdown));
        if (countdown <= 0) clearInterval(interval);
      }, 1000);
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-msg').textContent = msg;
    }

    // Start countdown
    let countdown = 3;
    const countdownEl = document.getElementById('countdown');
    const interval = setInterval(() => {
      countdown--;
      countdownEl.textContent = String(Math.max(0, countdown));
      if (countdown <= 0) clearInterval(interval);
    }, 1000);

    // Process callback
    handleCallback();
  </script>
</body>
</html>
